<!doctype html>

<!-- Made with Espy's Achievement Collector 
(https://github.com/espimyte/achievements-collector) -->

<html lang="en">
	<head>
		<meta
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=contain"
			name="viewport"
			charset="utf-8"
		/>
		<link rel="icon" href="data:image/png;base64,iVBORw0KGgo=" />
		<link
			media="all"
			rel="stylesheet"
			type="text/css"
			href="achievements.css"
		/>
		<title>Achievements</title>
	</head>
	<body>
		<div id="main">
			<div id="settings">
				<input type="checkbox" id="grouping" name="grouping" />
				<label for="grouping">Group by game</label>
			</div>
			<div id="header">
				<h1 id="title">ACHIEVEMENTS</h1>
			</div>
			<div id="achievements_wrapper">
				<div id="achievements"></div>
			</div>
			<button id="load_more" disabled>Load More</button>
			<div id="footer">
				<p>Last updated <span id="last_updated">N/A</span></p>
				<p>
					Viewing <span id="ach_count">0</span> of <span id="ach_total">0</span>
					achievements
				</p>
				<p>
					<!-- You can remove this if you want -->
					Made with
					<a href="https://github.com/espimyte/achievements-collector"
						>Espy's Achievement Collector</a
					>
				</p>
			</div>
		</div>
		<script>
			const jsonPath = "achievements.json"; // Path to achievements JSON file
			const useRootPath = false; // If using relative image paths, whether or not to start from the root folder
			const initialLoadCount = 300; // How many achievements to load initially
			const loadIncrement = 200; // How many achievements to load after pressing 'load more'
			const achSize = 64; // Size of achievement icons, in pixels
		</script>
		<script src="process-achievements.js"></script>
	</body>
</html>
